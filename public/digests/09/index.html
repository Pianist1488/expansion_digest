document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e:12px;color:#46566c;background:#F4F7FA;border:1px solid rgba(16,28,44,.08);padding:5px 11px;border-radius:999px;\">~$100M GMV<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#46566c;background:#F4F7FA;border:1px solid rgba(16,28,44,.08);padding:5px 11px;border-radius:999px;\">8× за 4 года<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display: flex; gap: 12px; align-items: flex-start; background: rgba(224,165,46,.12); border: 1px solid rgba(224,165,46,.34); border-radius: 12px; padding: 14px 16px; margin-bottom: 22px; width: 571px; height: 55px\">\n      <span style=\"flex:0 0 auto;font-size:16px;\">⚠<\u002Fspan><p style=\"margin: 0; font-size: 12px; line-height: 1.55; color: #7a5a12; width: 514px; height: 32px\">Не полностью американский бренд — важно для команды: часть успеха связана со скоростью китайского производственного цикла.<\u002Fp>\n      \n    <\u002Fdiv>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin-bottom:8px;\">Что за бренд<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">Halara, DTC-бренд женской одежды. Основан в 2020 году Joyce Zhang в Гонконге (штаб-квартира в ГK, продажи преимущественно в США).<\u002Fp>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 8px;\">Модель в одном абзаце<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">Halara запустила US-версию TikTok Shop в октябре 2023 практически с нулевым платным бюджетом. Стратегия — не «реклама про продукт», а контент для платформы: примерки, «до/после», честные оценки посадки. Алгоритм оценил это как органическое видео и начал давать охваты. Фирменный SKU — UltraSculpt SoCinched Leggings&nbsp; сгенерировал <br><b style=\"color: rgb(20, 36, 58);\">$20,54 млн lifetime GMV<\u002Fb> только на TikTok Shop (735K продаж).<\u002Fp>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 8px;\">Цифры<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">Выручка выросла в 8 раз с момента запуска в 2020, с 2021 удваивается ежегодно. Оценочная выручка на TikTok Shop за 2025 — <b style=\"color:#14243a;\">~$100 млн<\u002Fb> только на этой платформе. Во время TikTok Super Brand Day в июне 2024 бренд собрал 115M просмотров за 6 дней.<\u002Fp>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 10px;\">Что уникального<\u002Fdiv>\n    <ul style=\"list-style:none;padding:0;margin:0 0 20px;display:flex;flex-direction:column;gap:14px;\">\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.55;\"><span style=\"color:#22AC80;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color:#14243a;\">Контент для платформы, а не про платформу.<\u002Fb> Halara делает видео, которое зритель смотрит ради видео. Продукт естественно попадает в кадр.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.55;\"><span style=\"color:#22AC80;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color:#14243a;\">Скорость производства.<\u002Fb> HK штаб-квартира + прямые заводы дают цикл «идея → SKU на полке» за считанные недели.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.55;\"><span style=\"color:#22AC80;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color:#14243a;\">Кросс-платформенность.<\u002Fb> Модель работает и в TikTok Shop US, и в UK — за счёт единого культурного языка нано-блогеров.<\u002Fspan><\u002Fli>\n    <\u002Ful>\n\n    <div style=\"background:rgba(34,172,128,.07);border-radius:14px;padding:18px 20px;margin-top:8px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#15745A;margin-bottom:8px;\">Адаптация на WB / Ozon / РФ<\u002Fdiv>\n      <p style=\"font-size:16px;line-height:1.62;margin:0;color:#46566c;\"> Прямого аналога TikTok Shop нет, но VK Clips и Reels работают на схожем принципе алгоритмов. Модель: небольшая линейка одежды + системный поток видео-примерок + быстрая ротация трендовых цветов и фасонов. <br>Категории с визуальной демонстрацией: одежда, аксессуары, домашний текстиль.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-top:22px;padding-top:18px;border-top:1px solid rgba(16,28,44,.09);\">\n      <div style=\"font-size:14px;color:#62748c;\">Открыть: <a href=\"https://thehalara.com\">thehalara.com<\u002Fa> · Instagram* @halara_official<\u002Fdiv>\n      <div style=\"display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#B07E10;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#E0A52E;\"><\u002Fspan>средняя<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Case 3 · Made by Mitchell -->\n  <section id=\"case3\" class=\"sec card\" style=\"scroll-margin-top:80px;background:#fff;border:1px solid rgba(16,28,44,.09);border-radius:22px;padding:clamp(22px,4vw,34px);margin-bottom:24px;box-shadow:0 1px 2px rgba(16,28,44,.04),0 18px 40px -26px rgba(16,28,44,.2);\">\n    <div style=\"display:flex;gap:18px;align-items:center;margin-bottom:22px;\">\n      <div style=\"flex:0 0 auto;width:96px;height:96px;border-radius:18px;overflow:hidden;border:1px solid rgba(16,28,44,.1);background:#F4F7FA;\">\n        <div style=\"position:relative;width:100%;height:100%;overflow:hidden;\"><img alt=\"Logo\" src=\"data:image/webp;base64,UklGRtwpAABXRUJQVlA4WAoAAAAgAAAAlgAAvQAASUNDUMgBAAAAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA r:#8A9BB0;margin:22px 0 8px;\">Переломный момент<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">Summer Sale 2024. Бренд провёл 12-часовую LIVE, во время которой продавалось по одному продукту в секунду. За событие сгенерировали <b style=\"color:#14243a;\">$830 000<\u002Fb>, а за 24 часа перешагнули <b style=\"color:#14243a;\">$1 млн<\u002Fb> — первый UK-бренд, достигший этой отметки на TikTok Shop.<\u002Fp>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 8px;\">Модель в одном абзаце<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">Одержимость рекордным LIVE-каналом становится инфраструктурой.<br>С июня 2023 бренд идёт в эфир минимум 6 часов в день, каждый день. <br>В начале 2024 создали отдельную команду из 7 человек только под TikTok Shop live-стримы. Алгоритм видит: у бренда не событие, а постоянный поток. Платформа сама пришла с предложением провести рекордный LIVE во время Summer Sale и субсидировала часть скидок.<\u002Fp>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 10px;\">Что уникального<\u002Fdiv>\n    <ul style=\"list-style:none;padding:0;margin:0 0 20px;display:flex;flex-direction:column;gap:14px;\">\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.55;\"><span style=\"color:#22AC80;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color:#14243a;\">LIVE как ежедневная работа, не акция.<\u002Fb> 6+ часов эфира каждый день — уровень стримера, а не бьюти-бренда.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.55;\"><span style=\"color:#22AC80;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color:#14243a;\">Основатель как двигатель.<\u002Fb> Митчелл сам стоит перед камерой. Личность визажиста — одновременно продукт и канал дистрибуции.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.55;\"><span style=\"color:#22AC80;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color:#14243a;\">Обратная монетизация с платформы.<\u002Fb> Когда бренд стал крупнейшим на UK-платформе, TikTok начал приходить сам с промо. Платформа платит успешному партнёру, а не наоборот.<\u002Fspan><\u002Fli>\n    <\u002Ful>\n\n    <div style=\"background:rgba(34,172,128,.07);border-radius:14px;padding:18px 20px;margin-top:8px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#15745A;margin-bottom:8px;\">Адаптация на WB / Ozon / РФ<\u002Fdiv>\n      <p style=\"font-size:16px;line-height:1.62;margin:0;color:#46566c;\">&nbsp;LIVE-стримы на WB пока не набрали массы, но VK LIVE, эфиры в Instagram* и TG Live относительно работают. Модель: 3-часовые ежедневные эфиры с основателем/бренд-лицом, каталог 30–50 SKU с быстрым перебором, команда из 3–5 человек на съёмку/монтаж/отправку заявок.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-top:22px;padding-top:18px;border-top:1px solid rgba(16,28,44,.09);\">\n      <div style=\"font-size:14px;color:#62748c;\">Открыть: <a href=\"https://madebymitchell.com\">madebymitchell.com<\u002Fa> · Instagram* @madebymitchell<\u002Fdiv>\n      <div style=\"display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#15745A;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#22AC80;\"><\u002Fspan>высокая<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Case 4 · TRIP -->\n  <section id=\"case4\" class=\"sec card\" style=\"scroll-margin-top:80px;background:#fff;border:1px solid rgba(16,28,44,.09);border-radius:22px;padding:clamp(22px,4vw,34px);margin-bottom:24px;box-shadow:0 1px 2px rgba(16,28,44,.04),0 18px 40px -26px rgba(16  <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#46566c;background:#F4F7FA;border:1px solid rgba(16,28,44,.08);padding:5px 11px;border-radius:999px;\">Великобритания<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#46566c;background:#F4F7FA;border:1px solid rgba(16,28,44,.08);padding:5px 11px;border-radius:999px;\">$100M выручки в 2025<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#46566c;background:#F4F7FA;border:1px solid rgba(16,28,44,.08);padding:5px 11px;border-radius:999px;\">10 000+ точек продаж<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin-bottom:8px;\">Что за бренд<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">TRIP, Великобритания. Основан в 2019 году Olivia Ferdi и Daniel Khoury (оба ушли из юридической и финансовой карьеры). Категория — функциональные напитки на CBD и адаптогенах: «drinks for calm» — расслабляющая замена алкоголю и энергетикам.<\u002Fp>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 8px;\">Переломный момент<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">Выход на TikTok Shop в августе 2024. Через 5 месяцев TRIP стал #1 функциональным напитком на платформе. GMV в январе 2025 показал резкий всплеск против декабря 2024. Дальнейшее развитие шло по всем крупным сетям.<\u002Fp>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 8px;\">Модель в одном абзаце<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">TRIP собрал сеть 150 000 креаторов-аффилиатов через TikTok Shop — каждый получает комиссию с продаж по своей ссылке.<br>Это распределённая модель дистрибуции: создатель → его аудитория → покупка → комиссия автоматически. <br>Контент&nbsp; не про CBD, а про «моменты спокойствия» (после тренажёрки, перед сном, в разгар рабочего дня).<\u002Fp>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 8px;\">Цифры<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">По данным пресс-релиза (октябрь 2025): TRIP достиг <b style=\"color:#14243a;\">$100 млн выручки<\u002Fb> при положительной юнит-экономике в 2025 и прогнозирует $200 млн+ в 2026. К октябрю 2025 — <b style=\"color:#14243a;\">10 000+ точек продаж<\u002Fb> в США (Target, Sprouts, Whole Foods, H-E-B, Wegmans, CVS, Erewhon, Soho House) и 50 000+ глобально. Ноябрь 2025 — раунд $40 млн при валюации $300+ млн.<\u002Fp>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 10px;\">Что уникального<\u002Fdiv>\n    <ul style=\"list-style:none;padding:0;margin:0 0 20px;display:flex;flex-direction:column;gap:14px;\">\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.55;\"><span style=\"color:#22AC80;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color:#14243a;\">Аффилиатная воронка без ручного менеджмента.<\u002Fb> 150K создателей невозможно вести вручную — TikTok Shop распределяет комиссии автоматически.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.55;\"><span style=\"color:#22AC80;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color:#14243a;\">Контент про эмоцию, не про продукт.<\u002Fb> Каждый ролик — про состояние (тревога, стресс, восстановление), а бутылка появляется как часть решения.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.55;\"><span style=\"color:#22AC80;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color:#14243a;\">Ритейл идёт следом.<\u002Fb> Сети видят динамику продаж на TikTok и сами подписывают контракт. Обратный порядок: не бренд идёт к сети, а сеть к бренду.<\u002Fspan><\u002Fli>\n    <\u002Ful>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 8px;\">Где можно применить<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">Любая эмоционально-функциональная категория: сон, восстановление, концентрация, отношения, спорт. Особенно там, где привычка потребления встроена в конкретную ситуацию.<\u002Fp>\n\n    <div style=\"background:rgba(34,172,128,.07);border-radius:14px;padding:18px 20px;margin-top:8px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#15745A;margin-bottom:8px;\">Адаптация на WB / Ozon / РФ<\u002Fdiv>\n      <p style=\"font-size:16px;line-height:1.62;margin:0;color:#46566c;\"> CBD в РФ ограничен, но категория «функциональные напитки» широкая (травяные тонизирующие, кето-электролиты, ноотропные напитки). Модель: бренд с чёткой эмоциональной позицией + партнёрская программа с автовыплатами через VK Ads / собственную партнёрку.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-top:22px;padding-top:18px;border-top:1px solid rgba(16,28,44,.09);\">\n      <div style=\"font-size:14px;color:#62748c;\">Открыть: <a href=\"https://drinktrip.com\">drinktrip.com<\u002Fa> · Instagram* @trip_drinks<\u002Fdiv>\n      <div style=\"display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#15745A;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#22AC80;\"><\u002Fspan>высокая<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Case 5 · Pop Daddy -->\n  <section id=\"case5\" \u002Fdiv>\n\n    <div style=\"display:flex;gap:12px;align-items:flex-start;background:rgba(224,165,46,.12);border:1px solid rgba(224,165,46,.34);border-radius:12px;padding:14px 16px;margin-bottom:22px;\">\n      <span style=\"flex:0 0 auto;font-size:16px;\">⚠<\u002Fspan>\n      <p style=\"margin:0;font-size:15px;line-height:1.55;color:#7a5a12;\">Основан в 2013, добавлен в дайджест, как ярчайший пример модели «сначала свой контент, потом аффилиаты», которая лежит в основе Шага 1 гайда ниже.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin-bottom:8px;\">Что за бренд<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">Pop Daddy Snacks (США). Категория — попкорн и солёные крендели с приправами (seasoned pretzels) на основе семейного рецепта. <br>Кредо бренда — «Bold Snacks made with Big Heart».<\u002Fp>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 8px;\">Модель в одном абзаце<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">Pop Daddy не пытался быть модной DTC-историей. Они превратили традиционный семейный рецепт в контент, который аудитория TikTok сохраняет и пересылает: «попробуй, это реально папин рецепт». <br>Первые полгода на TikTok Shop получали отказы от всех крупных креторов, потому что не набрали ещё продаж своим контентом. Только когда пошли цифры от собственных роликов, аффилиаты начали приходить сами.<\u002Fp>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 8px;\">Цифры<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\"><b style=\"color:#14243a;\">$700 000<\u002Fb> оборота за один месяц на TikTok Shop. 490 000+ единиц продукции продано через платформу. 138 600+ подписчиков аккаунта. 88%+ позитивных отзывов. Виральное видео папиного рецепта стало основой всего контентного потока.<\u002Fp>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 10px;\">Что уникального<\u002Fdiv>\n    <ul style=\"list-style:none;padding:0;margin:0 0 20px;display:flex;flex-direction:column;gap:14px;\">\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.55;\"><span style=\"color:#22AC80;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color: rgb(20, 36, 58);\">Собственный контент, потом аффилиаты.<\u002Fb> Первые продажи бренд сделал сам, без креаторов. Аффилиаты пришли на органическую динамику.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.55;\"><span style=\"color:#22AC80;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color: rgb(20, 36, 58);\">Аутентичность как ядро.<\u002Fb> Рецепт папы, семейный бизнес, руки в муке — это буквально семейная традиция, а не история ради контента.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.55;\"><span style=\"color:#22AC80;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color: rgb(20, 36, 58);\">Терпение на старте.<\u002Fb> Полгода отказов не сломили команды, бренд генерировал контент, и результаты не заставили себя ждать.<\u002Fspan><\u002Fli>\n    <\u002Ful>\n\n    <div style=\"background:rgba(34,172,128,.07);border-radius:14px;padding:18px 20px;margin-top:8px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#15745A;margin-bottom:8px;\">Адаптация на WB / Ozon / РФ<\u002Fdiv>\n      <p style=\"font-size:16px;line-height:1.62;margin:0;color:#46566c;\"> Продовольственные категории на WB растут, но LIVE и вирусный food-контент пока слабы. Модель: узкая линейка (3–5 SKU) + системный контент с историей бренда + первые полгода без ожиданий от «крупных блогеров». Подходит локальным брендам продуктов, соусам, снекам, специям, крафтовым напиткам.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-top:22px;padding-top:18px;border-top:1px solid rgba(16,28,44,.09);\">\n      <div style=\"font-size:14px;color:#62748c;\">Открыть: <a href=\"https://popdaddysnacks.com\">popdaddysnacks.com<\u002Fa> · Instagram* @popdaddysnacks<\u002Fdiv>\n      <div style=\"display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#15745A;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#22AC80;\"><\u002Fspan>высокая<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ======= ANTI-CASE ======= -->\n  <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:20px;\">\n    <span style=\"font-family:'Unbounded',sans-serif;font-weight:800;font-size:13px;letter-spacing:.02em;color:#E5564B;\">!<\u002Fspan>\n    <h2 style=\"font-family:'Unbounded',sans-serif;font-weight:700;font-size:clamp(22px,4vw,30px);color:#14243a;margin:0;letter-spacing:-0.01em;\">Анти-кейс<\u002Fh2>\n  <\u002Fdiv>\n\n  <section id=\"anti\" class=\"sec card\" style=\"scroll-margin-top:80px;background:#fff;border:1px solid rgba(229,86,75,.3);border-radius:22px;padding:clamp(22px,4vw,34px);margin-bottom:64px;box-shadow:0 1px 2px rgba(16,28,44,.04),0 18px 40px -26px rgba(229,86,75,.28);\">\n    <div style=\"display:flex;gap:18px;align-items:center;margin-bottom:22px;\">\n      <div style=\"flex:0 0 auto;width:96px;height:96px;border-radius:18px;overflow:hidden;border:1px solid rgba(16,28,44,.1);background:#F4F7FA;\">\n        <div style=\"position:relative;width:100%;height:100%;overflow:hidden;\"><img alt=\"Logo\" src=\"data:image/webp;base64,UklGRhgZAABXRUJQVlA4WAoAAAAgAAAAvQAAtAAASUNDUMgBAAAAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAA :1.72;\">Glossier (США). Основан в 2014 году Эмили Вайсс. Премиум-косметика в манере чистого минимализма, «макияж без макияжа», аудитория миллениалов через блог Into The Gloss. Пиковая фаза — 2019–2022.<\u002Fp>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 12px;\">Что произошло · траектория<\u002Fdiv>\n    <ul style=\"list-style:none;padding:0;margin:0 0 20px;display:flex;flex-direction:column;gap:0;border-left:2px solid rgba(229,86,75,.25);\">\n      <li style=\"display:flex;gap:14px;padding:0 0 16px 18px;position:relative;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#C8392E;flex:0 0 74px;\">2019<\u002Fspan><span style=\"font-size:16px;line-height:1.5;color:#46566c;\">Series E $100 млн при валюации $1,2 млрд — статус «beauty unicorn».<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:14px;padding:0 0 16px 18px;position:relative;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#C8392E;flex:0 0 74px;\">2021<\u002Fspan><span style=\"font-size:16px;line-height:1.5;color:#46566c;\">Пик валюации ~$1,8 млрд, привлечено суммарно ~$266 млн.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:14px;padding:0 0 16px 18px;position:relative;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#C8392E;flex:0 0 74px;\">2022–24<\u002Fspan><span style=\"font-size:16px;line-height:1.5;color:#46566c;\">Уход в оффлайн (Sephora, свои магазины), рост CAC, снижение органического охвата.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:14px;padding:0 0 16px 18px;position:relative;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#C8392E;flex:0 0 74px;\">10.2025<\u002Fspan><span style=\"font-size:16px;line-height:1.5;color:#46566c;\">Новый CEO Colin Walsh (экс-CEO OUAI, ex-P&amp;G).<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:14px;padding:0 0 16px 18px;position:relative;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#C8392E;flex:0 0 74px;\">02.2026<\u002Fspan><span style=\"font-size:16px;line-height:1.5;color:#46566c;\">Сокращения: 50+ сотрудников (Business of Fashion).<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:14px;padding:0 0 16px 18px;position:relative;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#C8392E;flex:0 0 74px;\">04.2026<\u002Fspan><span style=\"font-size:16px;line-height:1.5;color:#46566c;\">Закрытие 9 из 12 магазинов за 2,5 года. Останется 3.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:14px;padding:0 0 0 18px;position:relative;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#C8392E;flex:0 0 74px;\">сегодня<\u002Fspan><span style=\"font-size:16px;line-height:1.5;color:#46566c;\">Валюация упала более чем в 2 раза от пика (ниже $1 млрд по оценке Puck).<\u002Fspan><\u002Fli>\n    <\u002Ful>\n\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8A9BB0;margin:22px 0 8px;\">Что значит<\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">Glossier строил бренд через комьюнити одним из первых в контент-маркетинге ниши бьюти (Into The Gloss), но в переоценке 2021–2022 сменил стратегию на «рост через магазины и Sephora». Оффлайн даёт cash flow, но не строит отношения с клиентом. <br>Когда рынок потребовал эффективности, все три канала оказались арендованными:<\u002Fp>\n    <ul style=\"list-style:none;padding:0;margin:0 0 20px;display:flex;flex-direction:column;gap:10px;\">\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.5;\"><span style=\"color:#E5564B;font-weight:800;flex:0 0 auto;\">×<\u002Fspan><span>Магазины — арендованный трафик, а не свой.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.5;\"><span style=\"color:#E5564B;font-weight:800;flex:0 0 auto;\">×<\u002Fspan><span>Sephora — арендованная полка.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.5;\"><span style=\"color:#E5564B;font-weight:800;flex:0 0 auto;\">×<\u002Fspan><span>Собственный контент и community за 5 лет утратили динамику.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.5;\"><span style=\"color:#E5564B;font-weight:800;flex:0 0 auto;\">×<\u002Fspan><span>Платный DTC-канал стал единственным двигателем — со стоимостью привлечения, которая не окупается.<\u002Fspan><\u002Fli>\n    <\u002Ful>\n\n    <div style=\"background:rgba(229,86,75,.07);border:1px solid rgba(229,86,75,.2);border-radius:14px;padding:18px 20px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#C8392E;margin-bottom:12px;\">Чему учит<\u002Fdiv>\n      <ul style=\"list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:12px;\">\n        <li style=\"display:flex;gap:12px;font-size:16px;line-height:1.55;color:#46566c;\"><span style=\"color:#C8392E;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color: rgb(20, 36, 58);\">Community — это не «когда-то был контент».<\u002Fb> Это постоянно генерируемый актив и вовлечение. Останавливается генерация — растворяется аудитория.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:12px;font-size:16px;line-height:1.55;color:#46566c;\"><span style=\"color:#C8392E;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color:#14243a;\">Арендованный трафик не заменяет активов.<\u002Fb> Аренда быстро масштабируется, но не создаёт барьера защищённости.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:12px;font-size:16px;line-height:1.55;color:#46566c;\"><span style=\"color:#C8392E;font-weight:800;flex:0 0 auto;\">→<\u002Fspan><span><b style=\"color: rgb(20, 36, 58);\">Смена CEO и сокращения не спасают,<\u002Fb> если нет&nbsp; процесса генерации контента и вовлечения аудитории. Скорее отодвигают проблему.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-top:22px;padding-top:18px;border-top:1px solid rgba(16,28,44,.09);\">\n      <div style=\"font-size:14px;color:#62748c;\">Где применимо в РФ: любой selfcare/beauty-бренд, заходящий в Магнит Косметик / Золотое Яблоко и одновременно сокращающий производство контента. Или DTC с 60%+ выручки на платном трафике без сети креаторов.<\u002Fdiv>\n      <div style=\"display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#15745A;flex:0 0 auto;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#22AC80;\"><\u002Fspan>высокая<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ======= PART 3 ======= -->\n  <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:8px;\">\n    <span style=\"font-family:'Unbounded',sans-serif;font-weight:800;font-size:13px;letter-spacing:.02em;color:#22AC80;\">03<\u002Fspan>\n    <h2 style=\"font-family:'Unbounded',sans-serif;font-weight:700;font-size:clamp(22px,4vw,30px);color:#14243a;margin:0;letter-spacing:-0.01em;\">Часть 3 · Прикладное<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:flex;gap:14px;align-items:flex-start;background:rgba(34,172,128,.08);border:1px solid rgba(34,172,128,.22);border-radius:16px;padding:18px 20px;margin:20px 0 44px;\">\n    <div style=\"font-family:'Unbounded',sans-serif;font-weight:800;font-size:34px;line-height:1;color:#15745A;flex:0 0 auto;\">80+<\u002Fdiv>\n    <p style=\"margin:0;font-size:15px;line-height:1.55;color:#46566c;\">метрик по каждому TikTok Shop-бренду отслеживает Charm.io — от числа активных аффилиатов до среднего оборота на создателя. Инструмент, чтобы понять, как построить контент-актив, глядя на конкурентов.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- Services -->\n  <section id=\"services\" class=\"sec card\" style=\"scroll-margin-top:80px;background:#fff;border:1px solid rgba(16,28,44,.09);border-radius:22px;padding:clamp(22px,4vw,34px);margin-bottom:24px;box-shadow:0 1px 2px rgba(16,28,44,.04),0 18px 40px -26px rgba(16,28,44,.2);\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:#15745A;margin-bottom:12px;\">Сервис недели<\u002Fdiv>\n    <h3 style=\"font-family:'Manrope',sans-serif;font-weight:800;font-size:clamp(20px,3.4vw,26px);line-height:1.25;color:#14243a;margin:0 0 24px;\">Charm.io + Rizz.market — аналитика контента<\u002Fh3>\n\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\">\n      <div style=\"font-family:'Unbounded',sans-serif;font-weight:800;font-size:15px;color:#14243a;\">Charm.io<\u002Fdiv>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#46566c;background:#F4F7FA;border:1px solid rgba(16,28,44,.08);padding:4px 10px;border-radius:999px;\">TikTok Shop · сети создателей<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">Платформа аналитики e-commerce с фокусом на social commerce и TikTok Shop. По каждому бренду показывает: сколько активных аффилиатов, какие видео конвертируют, средний GMV на создателя, топ-продукты, темпы роста. Публикует топ-10 селлеров TikTok Shop квартально (Q1 2026 — по данным FastMoss, июнь 2026).<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:6px 0 18px;\">\n      <div style=\"display:flex;gap:10px;font-size:15px;line-height:1.45;color:#46566c;\"><span style=\"color:#22AC80;\">•<\u002Fspan>Профили тысяч брендов с метриками<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;font-size:15px;line-height:1.45;color:#46566c;\"><span style=\"color:#22AC80;\">•<\u002Fspan>Динамика GMV по неделям<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;font-size:15px;line-height:1.45;color:#46566c;\"><span style=\"color:#22AC80;\">•<\u002Fspan>Список активных создателей и их эффективность<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;font-size:15px;line-height:1.45;color:#46566c;\"><span style=\"color:#22AC80;\">•<\u002Fspan>Инсайты по категориям<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;font-size:15px;line-height:1.45;color:#46566c;\"><span style=\"color:#22AC80;\">•<\u002Fspan>Интеграция с Amazon, Shopify, Wayfair<\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:16px;line-height:1.6;color:#46566c;\"><b style=\"color:#14243a;\">Цена.<\u002Fb> По внутренним источникам — от $500/мес за базовый доступ; корпоративные тарифы индивидуально. Открытых прайсов на сайте нет.<\u002Fp>\n    <p style=\"font-size:16px;line-height:1.6;color:#46566c;\"><b style=\"color: rgb(20, 36, 58);\">Зачем тестировать на неделе.<\u002Fb> За 1–2 часа посмотреть, какие 10 брендов в вашей категории получают органический трафик и как выглядит их сеть креаторов — целевой ориентир по числу аффилиатов, структуре контента и частоте LIVE.<\u002Fp>\n    <div style=\"font-size:14px;color:#62748c;margin-bottom:26px;\">Открыть: <a href=\"https://charm.io\">charm.io<\u002Fa><\u002Fdiv>\n\n    <div style=\"height:1px;background:rgba(16,28,44,.09);margin-bottom:26px;\"><\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\">\n      <div style=\"font-family:'Unbounded',sans-serif;font-weight:800;font-size:15px;color:#14243a;\">Rizz.market<\u002Fdiv>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#0F7280;background:rgba(19,141,156,.1);border:1px solid rgba(19,141,156,.28);padding:4px 10px;border-radius:999px;\">Российский аналог · WB / Ozon<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:18px;line-height:1.72;\">Российская UGC-платформа для маркетплейсов. Помогает получать пользовательские отзывы и видео-контент от реальных покупателей — аналог программ вроде Amazon Vine.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:6px 0 18px;\">\n      <div style=\"display:flex;gap:10px;font-size:15px;line-height:1.45;color:#46566c;\"><span style=\"color:#138D9C;\">•<\u002Fspan>База проверенных UGC-создателей<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;font-size:15px;line-height:1.45;color:#46566c;\"><span style=\"color:#138D9C;\">•<\u002Fspan>Автоподбор под категорию<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;font-size:15px;line-height:1.45;color:#46566c;\"><span style=\"color:#138D9C;\">•<\u002Fspan>Отслеживание публикации и качества<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;font-size:15px;line-height:1.45;color:#46566c;\"><span style=\"color:#138D9C;\">•<\u002Fspan>Интеграция с карточками WB / Ozon<\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:16px;line-height:1.6;color:#46566c;\"><b style=\"color:#14243a;\">Зачем тестировать на неделе.<\u002Fb> Для нового SKU или переупакованной карточки — 5–10 UGC-обзоров за 2–3 недели поднимают CTR и конверсию сильнее, чем платная реклама.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;\">\n      <div style=\"font-size:14px;color:#62748c;\">Открыть: <a href=\"https://rizz.market\">rizz.market<\u002Fa><\u002Fdiv>\n      <div style=\"display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#15745A;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#22AC80;\"><\u002Fspan>высокая по обеим платформам<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Guide -->\n  <section id=\"guide\" class=\"sec\" style=\"scroll-margin-top:80px;margin-bottom:24px;\">\n    <div style=\"background:linear-gradient(160deg,#0E1825,#16263A);border-radius:24px;padding:clamp(24px,5vw,40px);box-shadow:0 20px 50px -28px rgba(14,24,37,.6);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#5BD3AD;margin-bottom:16px;\">Гайд недели<\u002Fdiv>\n      <h3 style=\"font-family:'Unbounded',sans-serif;font-weight:700;font-size:clamp(22px,4vw,30px);line-height:1.15;color:#fff;margin:0 0 14px;letter-spacing:-0.01em;\">Как перестать покупать трафик&nbsp;<\u002Fh3>\n      <p style=\"font-size:17px;line-height:1.6;color:#B3C0D0;margin:0;\">Пять шагов к&nbsp; модели создания контента, где платформа сама приводит клиентов, потому что бренд играет по правилам.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;gap:16px;margin-top:16px;\">\n\n      <div class=\"card\" style=\"background:#fff;border:1px solid rgba(16,28,44,.09);border-radius:18px;padding:clamp(20px,4vw,30px);box-shadow:0 1px 2px rgba(16,28,44,.04),0 14px 34px -24px rgba(16,28,44,.2);\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:16px;\">\n          <span style=\"font-family:'Unbounded',sans-serif;font-weight:800;font-size:28px;color:#22AC80;line-height:1;\">1<\u002Fspan>\n          <h4 style=\"font-family:'Manrope',sans-serif;font-weight:800;font-size:clamp(18px,3vw,22px);color:#14243a;margin:0;line-height:1.2;\">Сначала собственный контент, потом аффилиаты<\u002Fh4>\n        <\u002Fdiv>\n        <p style=\"font-size:17px;line-height:1.65;\"><b style=\"color: rgb(20, 36, 58);\">Что делать.<\u002Fb> Первые полгода не жди креаторов. Сам делай ежедневно 3–5 роликов о продукте — распаковки, «до/после», ответы на вопросы, повседневное использование.<\u002Fp>\n        <p style=\"font-size:17px;line-height:1.65;\"><b style=\"color: rgb(20, 36, 58);\">Зачем.<\u002Fb> Алгоритм дают трафик тем, у кого уже есть продажи и вовлечённость. Ролик создателя — лотерейный билет, который выигрывает, только если у бренда уже есть история продаж.<\u002Fp>\n        <p style=\"font-size:17px;line-height:1.65;\"><b style=\"color: rgb(20, 36, 58);\">Пример.<\u002Fb> Pop Daddy Snacks первые полгода получали отказы от всех крупных креаторов, пока не набрали продажи собственным контентом. <br>Пошли цифры — аффилиаты пришли сами.<\u002Fp>\n        <div style=\"display:flex;gap:10px;align-items:flex-start;background:rgba(34,172,128,.08);border-radius:12px;padding:12px 14px;margin-top:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#15745A;flex:0 0 auto;padding-top:2px;\">KPI<\u002Fspan><span style=\"font-size:15px;line-height:1.5;color:#46566c;\">За 90 дней — 100+ своих роликов, 5–10 «маленьких» вирусных (&gt;100K), первые $10–30K продаж только на своём контенте.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"background:#fff;border:1px solid rgba(16,28,44,.09);border-radius:18px;padding:clamp(20px,4vw,30px);box-shadow:0 1px 2px rgba(16,28,44,.04),0 14px 34px -24px rgba(16,28,44,.2);\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:16px;\">\n          <span style=\"font-family:'Unbounded',sans-serif;font-weight:800;font-size:28px;color:#22AC80;line-height:1;\">2<\u002Fspan>\n          <h4 style=\"font-family:'Manrope',sans-serif;font-weight:800;font-size:clamp(18px,3vw,22px);color:#14243a;margin:0;line-height:1.2;\">Считай органику отдельно от платного<\u002Fh4>\n        <\u002Fdiv>\n        <p style=\"font-size:17px;line-height:1.65;\"><b style=\"color: rgb(20, 36, 58);\">Что делать.<\u002Fb> Раздели выручку: сколько с платного трафика (Ads Manager, ретаргетинг), сколько с органического (creator content, LIVE, поиск, реферал). Диагностика: если &gt;40% выручки с платных объявлений — ты покупаешь выручку, а не строишь актив.<\u002Fp>\n        <p style=\"font-size:17px;line-height:1.65;\"><b style=\"color:#14243a;\">Зачем.<\u002Fb> Рубль на платную рекламу без органической базы работает один раз и исчезает. Ролик создателя продолжает конвертировать месяцами — в поиске, в рекомендациях, при повторном просмотре.<\u002Fp>\n        <div style=\"display:flex;gap:10px;align-items:flex-start;background:rgba(34,172,128,.08);border-radius:12px;padding:12px 14px;margin-top:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#15745A;flex:0 0 auto;padding-top:2px;\">KPI<\u002Fspan><span style=\"font-size:15px;line-height:1.5;color:#46566c;\">Через 90 дней — доля органики &gt;50% совокупной выручки. Через 180 дней — &gt;65%.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"background:#fff;border:1px solid rgba(16,28,44,.09);border-radius:18px;padding:clamp(20px,4vw,30px);box-shadow:0 1px 2px rgba(16,28,44,.04),0 14px 34px -24px rgba(16,28,44,.2);\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:16px;\">\n          <span style=\"font-family:'Unbounded',sans-serif;font-weight:800;font-size:28px;color:#22AC80;line-height:1;\">3<\u002Fspan>\n          <h4 style=\"font-family:'Manrope',sans-serif;font-weight:800;font-size:clamp(18px,3vw,22px);color:#14243a;margin:0;line-height:1.2;\">Строй широко<\u002Fh4>\n        <\u002Fdiv>\n        <p style=\"font-size:17px;line-height:1.65;\"><b style=\"color: rgb(20, 36, 58);\">Что делать.<\u002Fb> Не гонись за 3 крупными инфлюенсерами. Ищи 100–500 небольших блогеров с аудиторией 10–50K.<\u002Fp>\n        <p style=\"font-size:17px;line-height:1.65;\"><b style=\"color: rgb(20, 36, 58);\">Зачем.<\u002Fb> Доверие у нишевых создателей выше, стоимость входа – образец продукта, а не гонорар в сотни тысяч.<\u002Fp>\n        <p style=\"font-size:17px;line-height:1.65;\"><b style=\"color: rgb(20, 36, 58);\">Пример.<\u002Fb> Bask &amp; Lather собрала 500 000 активных креаторов-аффилиатов. <br>Один ролик 14-летнего сына основательницы (без бюджета и договора) разогнал продажи в 4 раза за 24 часа.<\u002Fp>\n        <div style=\"display:flex;gap:10px;align-items:flex-start;background:rgba(34,172,128,.08);border-radius:12px;padding:12px 14px;margin-top:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#15745A;flex:0 0 auto;padding-top:2px;\">KPI<\u002Fspan><span style=\"font-size:15px;line-height:1.5;color:#46566c;\">Через 60 дней — &gt;500 отправок образцов, &gt;100 роликов. Через 180 дней — &gt;2 000 отправок, &gt;500 роликов.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"background:#fff;border:1px solid rgba(16,28,44,.09);border-radius:18px;padding:clamp(20px,4vw,30px);box-shadow:0 1px 2px rgba(16,28,44,.04),0 14px 34px -24px rgba(16,28,44,.2);\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:16px;\">\n          <span style=\"font-family:'Unbounded',sans-serif;font-weight:800;font-size:28px;color:#22AC80;line-height:1;\">4<\u002Fspan>\n          <h4 style=\"font-family:'Manrope',sans-serif;font-weight:800;font-size:clamp(18px,3vw,22px);color:#14243a;margin:0;line-height:1.2;\">LIVE как инфраструктура, не событие<\u002Fh4>\n        <\u002Fdiv>\n        <p style=\"font-size:17px;line-height:1.65;\"><b style=\"color: rgb(20, 36, 58);\">Что делать.<\u002Fb> Разовый LIVE в неделю ничего не строит. Ежедневный LIVE становится инфраструктурой — алгоритмы получают сигнал: бренд активен здесь и сейчас.<\u002Fp>\n        <p style=\"font-size:17px;line-height:1.65;\"><b style=\"color: rgb(20, 36, 58);\">Пример.<\u002Fb> Made by Mitchell — 6+ часов LIVE каждый день, 7 сотрудников только на стрим. Платформа сама пришла с предложением субсидировать промо — бренд стал слишком ценным для платформы, чтобы его игнорировать.<\u002Fp>\n        <div style=\"display:flex;gap:10px;align-items:flex-start;background:rgba(34,172,128,.08);border-radius:12px;padding:12px 14px;margin-top:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#15745A;flex:0 0 auto;padding-top:2px;\">KPI<\u002Fspan><span style=\"font-size:15px;line-height:1.5;color:#46566c;\">Через 60 дней — 3+ часа LIVE каждый день. Через 180 дней — 6+ часов ежедневно с рабочей командой.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"background:#fff;border:1px solid rgba(16,28,44,.09);border-radius:18px;padding:clamp(20px,4vw,30px);box-shadow:0 1px 2px rgba(16,28,44,.04),0 14px 34px -24px rgba(16,28,44,.2);\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:16px;\">\n          <span style=\"font-family:'Unbounded',sans-serif;font-weight:800;font-size:28px;color:#22AC80;line-height:1;\">5<\u002Fspan>\n          <h4 style=\"font-family:'Manrope',sans-serif;font-weight:800;font-size:clamp(18px,3vw,22px);color:#14243a;margin:0;line-height:1.2;\">Считай выручку с креатора, не с их количества<\u002Fh4>\n        <\u002Fdiv>\n        <p style=\"font-size:17px;line-height:1.65;\"><b style=\"color: rgb(20, 36, 58);\">Что делать.<\u002Fb> «У нас 5 000 аффилиатов» ничего не значит. Если система работает правильно, то «пустые» и неактивные креаторы вовремя отсеиваются, а оставшиеся приносят больше денег.&nbsp;<\u002Fp>\n        <p style=\"font-size:17px;line-height:1.65;\"><b style=\"color:#14243a;\">Пример.<\u002Fb> Средний бренд из топ-10 TikTok Shop — <b style=\"color:#14243a;\">≈$7 552<\u002Fb> на активного создателя. У массового бренда — <b style=\"color:#14243a;\">~$400<\u002Fb>. Массовый рекрутинг без отсева — не система, а провал.<\u002Fp>\n        <div style=\"display:flex;gap:10px;align-items:flex-start;background:rgba(34,172,128,.08);border-radius:12px;padding:12px 14px;margin-top:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#15745A;flex:0 0 auto;padding-top:2px;\">KPI<\u002Fspan><span style=\"font-size:15px;line-height:1.5;color:#46566c;\">Через 90 дней — средний оборот на активного создателя &gt;$1 000. Через 180 дней — &gt;$3 000.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div class=\"card\" style=\"background:linear-gradient(135deg,#22AC80,#138D9C);border-radius:20px;padding:clamp(22px,4vw,32px);margin-top:16px;box-shadow:0 20px 44px -26px rgba(19,141,156,.6);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.8);margin-bottom:16px;\">Финальный чек-лист<\u002Fdiv>\n      <ul style=\"list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:14px;\">\n        <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.5;color:#fff;\"><span style=\"flex:0 0 auto;\">✓<\u002Fspan><span>Собственные 100+ роликов сняты за первые 90 дней.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.5;color:#fff;\"><span style=\"flex:0 0 auto;\">✓<\u002Fspan><span>Доля органики отделена от платного в аналитике.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.5;color:#fff;\"><span style=\"flex:0 0 auto;\">✓<\u002Fspan><span>&gt;500 пробных отправок нано-блогерам с готовыми материалами.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.5;color:#fff;\"><span style=\"flex:0 0 auto;\">✓<\u002Fspan><span>Ежедневный LIVE 3+ часа с рабочей командой.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:12px;font-size:17px;line-height:1.5;color:#fff;\"><span style=\"flex:0 0 auto;\">✓<\u002Fspan><span>Отслеживается средний оборот на активного создателя — динамика по возрастанию.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ======= OFFLINE ======= -->\n  <section id=\"offline\" class=\"sec\" style=\"scroll-margin-top:80px;margin-top:8px;\">\n    <div style=\"background:linear-gradient(160deg,#0E1825,#16263A);border-radius:26px;overflow:hidden;box-shadow:0 24px 56px -30px rgba(14,24,37,.7);\">\n      <div style=\"width:100%;aspect-ratio:1180/531;overflow:hidden;\">\n        <img src=\"ae5ec797-80b2-45a3-8970-a774eddc44d9\" alt=\"Слёт Expansio в Нижнем Новгороде\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">\n      <\u002Fdiv>\n      <div style=\"padding:clamp(24px,5vw,40px);\">\n        <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:#5BD3AD;\">Офлайн Expansio<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.05em;color:#8A9BB0;background:rgba(255,255,255,.06);padding:5px 12px;border-radius:999px;\">Нижний Новгород · 24–26 июля<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Unbounded',sans-serif;font-weight:700;font-size:clamp(24px,4.6vw,36px);line-height:1.1;letter-spacing:-0.015em;color:#fff;margin:0 0 22px;text-wrap:balance;\">Самые сильные разговоры случаются не в чате<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.68;color:#B3C0D0;\">Они происходят за завтраком, на прогулке, во время совместных активностей или вечером после насыщенного дня. Именно там появляются новые знакомства, партнёрства, идеи и решения, которые потом влияют на бизнес.<\u002Fp>\n        <p style=\"font-size:18px;line-height:1.68;color:#B3C0D0;\">С 24 по 26 июля мы снова собираемся в Нижнем Новгороде. Три дня без спешки, чтобы познакомиться лично, обменяться опытом и просто провести время в компании предпринимателей, которые говорят с вами на одном языке.<\u002Fp>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:26px 0;\">\n          \n          \n        <\u002Fdiv>\n\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#8A9BB0;margin-bottom:14px;\">После прошлого слёта писали<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:28px;\">\n          <blockquote style=\"margin:0;background:rgba(255,255,255,.05);border-left:3px solid #22AC80;border-radius:0 14px 14px 0;padding:16px 18px;font-size:17px;line-height:1.55;color:#E8EDF3;font-style:italic;\">«Спасибо всем за встречу, с вами хочется обсуждать всё и смеяться бесконечно»<\u002Fblockquote>\n          <blockquote style=\"margin:0;background:rgba(255,255,255,.05);border-left:3px solid #22AC80;border-radius:0 14px 14px 0;padding:16px 18px;font-size:17px;line-height:1.55;color:#E8EDF3;font-style:italic;\">«Рад был лично познакомиться со всеми. Надеюсь, такие встречи станут доброй традицией»<\u002Fblockquote>\n        <\u002Fdiv>\n\n        <p style=\"font-size:18px;line-height:1.68;color:#B3C0D0;margin-bottom:24px;\">Если давно хотели познакомиться с участниками клуба не только онлайн — будем рады увидеться.<\u002Fp>\n        <a href=\"https://t.me/soul_expansio\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#22AC80,#138D9C);color:#fff;text-decoration:none;font-weight:700;font-size:16px;padding:15px 26px;border-radius:14px;box-shadow:0 14px 30px -14px rgba(34,172,128,.7);\">Программа и участие → @soul_expansio<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ======= FOOTER ======= -->\n  <footer style=\"margin-top:56px;padding-top:32px;border-top:1px solid rgba(16,28,44,.1);\">\n    <img src=\"fbb066f1-56e3-43c5-a070-ded68d22e320\" alt=\"Expansio\" style=\"height:24px;display:block;margin-bottom:16px;\">\n    <p style=\"font-size:13px;line-height:1.6;color:#8A9BB0;margin:0;max-width:60ch;\">Expansio Digest #09 · 06.07.2026. Материал носит информационный характер. * Instagram принадлежит Meta, признанной экстремистской и запрещённой в РФ.<\u002Fp>\n    <a href=\"#top\" class=\"no-print\" style=\"display:inline-flex;align-items:center;gap:8px;margin-top:20px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#15745A;\">↑ Наверх<\u002Fa>\n  <\u002Ffooter>\n\n<\u002Fmain>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { readTime: '' };\n\n  componentDidMount() {\n    // reading time from article word count\n    try {\n      const main = document.getElementById('top');\n      const words = (main ? main.innerText : '').trim().split(/\\s+/).length;\n      const mins = Math.max(1, Math.round(words / 180));\n      this.setState({ readTime: '~' + mins + ' мин чтения' });\n    } catch (e) { this.setState({ readTime: '' }); }\n\n    // scroll progress bar\n    this._onScroll = () => {\n      const el = this.progressRef;\n      if (!el) return;\n      const h = document.documentElement;\n      const max = (h.scrollHeight - h.clientHeight) || 1;\n      const pct = Math.min(100, Math.max(0, (h.scrollTop || window.scrollY) / max * 100));\n      el.style.width = pct + '%';\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n\n  componentWillUnmount() {\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n  }\n\n  renderVals() {\n    return {\n      readTime: this.state.readTime,\n      progressRef: (el) => { this.progressRef = el; },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<script src=\"/switcher.js\" defer><\u002Fscript>\n<\u002Fbody><\u002Fhtml>"
  </script>
